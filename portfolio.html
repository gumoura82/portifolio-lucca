<!doctype html>
<html lang="pt-BR" class="scroll-smooth bg-black">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio - Lucca Furlan</title>
  </head>
  <body class="bg-black text-white font-sans antialiased selection:bg-white/20 selection:text-white animate-fade-in">

    <!-- Header / Nav -->
    <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10" id="main-header">
      <div class="max-w-[1440px] mx-auto px-[40px] md:px-[80px] pt-[50px] pb-[30px] flex items-center justify-between">
        <!-- Left Side (Socials + Links) -->
        <div class="flex items-center space-x-8">
          <div class="flex items-center space-x-5">
            <a href="https://www.instagram.com/luccafurlan_?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="hover:text-white/70 transition-colors drop-shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
            </a>
            <a href="https://www.linkedin.com/in/lucca-de-oliveira-0bb966351/" target="_blank" class="hover:text-white/70 transition-colors drop-shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-linkedin"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
            </a>
          </div>
          <nav class="hidden md:flex space-x-2 text-[13px] font-semibold tracking-wide text-white drop-shadow-md">
            <a href="index.html#inicio" class="px-3 py-1.5 border border-transparent hover:border-white transition-colors">HOME</a>
            <a href="index.html#sobre" class="px-3 py-1.5 border border-transparent hover:border-white transition-colors">BIO</a>
          </nav>
        </div>

        <!-- Center (Logo) -->
        <div class="absolute left-1/2 -translate-x-1/2">
           <a href="index.html#inicio" class="font-serif text-[18px] font-bold tracking-wider text-white drop-shadow-md whitespace-nowrap">Lucca Furlan</a>
        </div>

        <!-- Right Side (Links) -->
        <div class="flex items-center">
          <nav class="hidden md:flex space-x-2 text-[13px] font-semibold tracking-wide text-white drop-shadow-md">
            <a href="portfolio.html" class="px-3 py-1.5 border border-white transition-colors">PORTFÓLIO</a>
            <a href="index.html#contato" class="px-3 py-1.5 border border-transparent hover:border-white transition-colors">CONTATO</a>
          </nav>
          
          <!-- Mobile Menu Button -->
          <button id="mobile-menu-btn" class="md:hidden text-white hover:text-white/70 transition-colors drop-shadow-md z-50 relative ml-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-black/95 backdrop-blur-md z-40 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
      <nav class="flex flex-col items-center space-y-6 text-[18px] font-semibold tracking-wide text-white">
        <a href="index.html#inicio" class="mobile-link px-4 py-2 border border-transparent hover:border-white transition-colors">HOME</a>
        <a href="index.html#sobre" class="mobile-link px-4 py-2 border border-transparent hover:border-white transition-colors">BIO</a>
        <a href="portfolio.html" class="mobile-link px-4 py-2 border border-transparent hover:border-white transition-colors">PORTFÓLIO</a>
        <a href="index.html#contato" class="mobile-link px-4 py-2 border border-transparent hover:border-white transition-colors">CONTATO</a>
      </nav>
    </div>

    <!-- Main Content -->
    <main class="pt-[100px] md:pt-[140px] min-h-screen">
      <!-- Portfólio (Dinâmico) -->
      <section id="portfolio" class="py-12 md:py-24 px-[40px] md:px-[60px] max-w-[1024px] mx-auto">
        <div class="mb-[24px] flex flex-col md:flex-row md:items-end justify-between gap-6 reveal">
          <div>
            <h2 class="text-[12px] uppercase tracking-[2px] text-white/40 mb-[16px]">Portfólio</h2>
            <p class="font-serif italic text-[24px]">Selecione um álbum</p>
          </div>
          
          <!-- Filtros -->
          <div class="flex gap-4 border-b border-white/20 pb-2">
            <button class="filter-btn active text-white text-[11px] uppercase tracking-wider font-semibold border-b-2 border-white pb-1 transition-colors" data-filter="all">TUDO</button>
            <button class="filter-btn text-white/50 hover:text-white text-[11px] uppercase tracking-wider font-semibold border-b-2 border-transparent hover:border-white/50 transition-colors" data-filter="photos">FOTOS</button>
            <button class="filter-btn text-white/50 hover:text-white text-[11px] uppercase tracking-wider font-semibold border-b-2 border-transparent hover:border-white/50 transition-colors" data-filter="videos">VÍDEOS</button>
          </div>
        </div>
        
        <!-- Container for Albums Grid -->
        <div id="albums-container" class="grid grid-cols-1 sm:grid-cols-2 gap-[12px]">
          <!-- Álbuns serão renderizados aqui pelo JS -->
        </div>
        
        <!-- Container for Album Photos (Hidden by default) -->
        <div id="gallery-container" class="hidden">
           <button id="back-to-albums" class="mb-8 flex items-center space-x-2 text-[11px] uppercase tracking-[1px] text-white/40 hover:text-white transition-colors cursor-pointer border-b border-white/10 pb-[2px]">
             <span>← Voltar aos Álbuns</span>
           </button>
           <h3 id="gallery-title" class="font-serif italic text-[24px] mb-[8px]">Nome do Álbum</h3>
           <p id="gallery-subtitle" class="text-[13px] text-white/40 mb-[24px] hidden">Subtítulo</p>
           <div id="gallery-grid" class="masonry-grid">
             <!-- Fotos do álbum serão renderizadas aqui -->
           </div>
        </div>
      </section>

      <!-- Lightbox Modal -->
      <div id="lightbox-modal" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <button id="lightbox-close" class="absolute top-6 right-6 text-white hover:text-white/70 transition-colors z-[110]">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
        </button>
        <img id="lightbox-image" src="" alt="Ampliada" class="max-w-[90vw] max-h-[90vh] object-contain" />
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-[40px] text-[11px] text-white/40 uppercase tracking-[1px] px-[40px] md:px-[60px] max-w-[1024px] mx-auto text-left border-t border-white/10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <p>&copy; 2026 Lucca Furlan.</p>
      <p>Desenvolvido por <a href="https://www.linkedin.com/in/gumoura82" target="_blank" rel="noopener noreferrer" class="hover:text-white transition-colors underline decoration-white/20 underline-offset-4">Gustavo Moura</a></p>
    </footer>

    <script type="module" src="/src/script.ts"></script>
  </body>
</html>
